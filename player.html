<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Outland TV Player</title>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
  #player, iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
</style>
</head>
<body>
  <div id="player"></div>
  <script>
    function qs(name) {
      var m = (window.location.search || '').match(new RegExp('[?&]' + name + '=([^&]+)'));
      return m ? decodeURIComponent(m[1]) : '';
    }
    var videoId = qs('v');
    var loop = qs('loop') === '1';
    var vol = parseInt(qs('vol'), 10);
    if (isNaN(vol)) { vol = 80; }

    var tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    var player;
    function applyVol(v) {
      if (!player) { return; }
      try {
        if (v <= 0) { player.mute(); }
        else { player.unMute(); player.setVolume(v); }
      } catch (e) {}
    }

    window.onYouTubeIframeAPIReady = function () {
      if (!videoId) { return; }
      player = new YT.Player('player', {
        videoId: videoId,
        playerVars: {
          autoplay: 1, controls: 0, rel: 0, playsinline: 1,
          modestbranding: 1, iv_load_policy: 3, fs: 0, disablekb: 1,
          loop: loop ? 1 : 0, playlist: loop ? videoId : undefined
        },
        events: {
          onReady: function (e) { applyVol(vol); e.target.playVideo(); },
          onStateChange: function (e) {
            if (loop && e.data === YT.PlayerState.ENDED) { e.target.playVideo(); }
          }
        }
      });
    };

    // messages en provenance du script FiveM (SendDuiMessage) : volume / play / pause en direct
    window.addEventListener('message', function (e) {
      var d = e.data;
      if (typeof d === 'string') { try { d = JSON.parse(d); } catch (err) { return; } }
      if (!d || !d.action) { return; }
      if (d.action === 'volume') { vol = parseInt(d.v, 10) || 0; applyVol(vol); }
      else if (d.action === 'pause' && player) { try { player.pauseVideo(); } catch (x) {} }
      else if (d.action === 'play' && player) { try { player.playVideo(); } catch (x) {} }
    });
  </script>
</body>
</html>
