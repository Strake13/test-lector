<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Outland TV Player</title>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
  #player, iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
</style>
</head>
<body>
  <div id="player"></div>
  <script>
    function qs(name) {
      var m = (window.location.search || '').match(new RegExp('[?&]' + name + '=([^&]+)'));
      return m ? decodeURIComponent(m[1]) : '';
    }
    var videoId = qs('v');
    var loop = qs('loop') === '1';

    var tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    var player;
    window.onYouTubeIframeAPIReady = function () {
      if (!videoId) { return; }
      player = new YT.Player('player', {
        videoId: videoId,
        playerVars: {
          autoplay: 1, controls: 0, rel: 0, playsinline: 1,
          modestbranding: 1, iv_load_policy: 3, fs: 0, disablekb: 1,
          loop: loop ? 1 : 0, playlist: loop ? videoId : undefined
        },
        events: {
          onReady: function (e) {
            try { e.target.unMute(); e.target.setVolume(80); } catch (err) {}
            e.target.playVideo();
          },
          onStateChange: function (e) {
            if (loop && e.data === YT.PlayerState.ENDED) { e.target.playVideo(); }
          }
        }
      });
    };
  </script>
</body>
</html>
